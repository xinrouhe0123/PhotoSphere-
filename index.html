<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoSphere Studio Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <!-- Header Navigation Grid component frame -->
    <header class="border-b border-gray-800 p-6 bg-gray-950">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wider text-indigo-400">PHOTOSPHERE</h1>
            <select id="photographerSelect" class="bg-indigo-900 text-indigo-200 px-3 py-1 rounded-full border border-indigo-700">
            <option>Loading photographers...</option>
</select>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <!-- Left Column: Upload Management Panel Layout -->
        <section class="bg-gray-950 p-6 rounded-xl border border-gray-800 h-fit">
            <h2 class="text-xl font-semibold mb-4 text-gray-200">Ingest New Asset</h2>
            <form id="uploadForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Asset Title</label>
                    <input type="text" id="uploadTitle" required placeholder="e.g. Mountain Shoot" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Select Photography File</label>
                    <input type="file" id="uploadFile" required accept="image/*" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-gray-400 focus:outline-none file:mr-4 file:py-1 file:px-3 file:rounded-full file:border-0 file:text-sm file:bg-indigo-900 file:text-indigo-200 hover:file:bg-indigo-800">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2 rounded transition shadow-md">Process & Store Safely</button>
            </form>
            <div id="uploadStatus" class="mt-3 text-sm hidden"></div>
        </section>

        <!-- Right Side Columns: Multi-Retrieval Filter Framework and Image Gallery Grid Display -->
        <section class="md:col-span-2 space-y-6">
            
            <!-- Filters Section -->
            <div class="bg-gray-950 p-6 rounded-xl border border-gray-800 space-y-4">
                <h2 class="text-xl font-semibold text-gray-200">Intelligent Multimedia Discovery Matrix</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs uppercase tracking-wider font-bold text-gray-500 mb-1">TBR (Text-Based Query)</label>
                        <input type="text" id="searchBar" placeholder="Search by exact asset title..." class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-wider font-bold text-gray-500 mb-1">CBR (Situation Classification Context)</label>
                        <select id="situationFilter" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
                            <option value="">All Contexts (Show All)</option>
                            <option value="Indoor">Indoor Environments</option>
                            <option value="Outdoor">Outdoor Environments</option>
                        </select>
                    </div>
                </div>
                <button onclick="triggerSearch()" class="w-full sm:w-auto px-6 py-2 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded transition shadow-md">Execute Matrix Search</button>
            </div>

            <!-- Dynamic Asset Display Output Area Layout Grid -->
            <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <!-- Javascript will inject data cards structural layout components here automatically -->
            </div>
        </section>
    </main>

    <!-- JavaScript Client Logic Controller Implementation Layer -->
    <script>
        const API_BASE = "http://127.0.0.1:8000";
        let CURRENT_USER_ID = ""; 
        async function loadPhotographers() {
            const response = await fetch(`${API_BASE}/photographers`);
            const photographers = await response.json();

            const select = document.getElementById("photographerSelect");
            select.innerHTML = "";

            photographers.forEach(p => {
                const option = document.createElement("option");
                option.value = p.photographer_id;
                option.textContent = `${p.photographer_id} (${p.photographer_name})`;
                select.appendChild(option);
            });

            if (photographers.length > 0) {
                CURRENT_USER_ID = photographers[0].photographer_id;
            }

            select.addEventListener("change", function () {
                CURRENT_USER_ID = this.value;
                triggerSearch();
            });
        } // Explicit user targeting profile context (ABR foundation enforcement)

        // Handle File Submissions
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusDiv = document.getElementById('uploadStatus');
            statusDiv.className = "mt-3 text-sm text-yellow-400 block";
            statusDiv.innerText = "Extracting Exif attributes & saving atomically...";

            const formData = new FormData();
            formData.append("file", document.getElementById('uploadFile').files[0]);
            formData.append("title", document.getElementById('uploadTitle').value);
            formData.append("photographer_id", CURRENT_USER_ID);

            try {
                const response = await fetch(`${API_BASE}/upload`, { method: "POST", body: formData });
                const result = await response.json();
                
                if(response.ok) {
                    statusDiv.className = "mt-3 text-sm text-emerald-400 block";
                    statusDiv.innerText = `Successfully saved! CBR Categorization result: ${result.environment}`;
                    document.getElementById('uploadForm').reset();
                    triggerSearch(); // Refresh grid layout context mapping results directly
                } else {
                    throw new Error(result.detail || "Unknown error encountered");
                }
            } catch (err) {
                statusDiv.className = "mt-3 text-sm text-red-400 block";
                statusDiv.innerText = `Transaction Aborted: ${err.message}`;
            }
        });

        // Query Search Execution Pipeline Engine
        async function triggerSearch() {
            const queryParam = document.getElementById('searchBar').value;
            const contextParam = document.getElementById('situationFilter').value;
            const gallery = document.getElementById('galleryGrid');

            let url = `${API_BASE}/search?photographer_id=${CURRENT_USER_ID}`;
            if(queryParam) url += `&text_search=${encodeURIComponent(queryParam)}`;
            if(contextParam) url += `&situation=${encodeURIComponent(contextParam)}`;

            try {
                const res = await fetch(url);
                const data = await res.get_records ? await res.get_records() : await res.json();
                gallery.innerHTML = "";

                if(data.length === 0) {
                    gallery.innerHTML = `<p class="text-gray-500 italic col-span-2 text-center py-8">No files found matching the search matrix.</p>`;
                    return;
                }

                data.forEach(item => {
                    const badgeColor = item.situation === 'Outdoor' ? 'bg-amber-900 text-amber-200 border-amber-700' : 'bg-blue-900 text-blue-200 border-blue-700';
                    gallery.innerHTML += `
                        <div class="bg-gray-950 border border-gray-800 rounded-xl overflow-hidden shadow-lg transition hover:border-gray-700">
                            <div class="h-48 bg-gray-900 flex items-center justify-center overflow-hidden">
                                <img src="${item.url}" alt="${item.title}" class="w-full h-full object-cover">
                            </div>
                            <div class="p-4 space-y-2">
                                <div class="flex justify-between items-start">
                                    <h3 class="font-bold text-lg tracking-wide text-gray-200 truncate w-3/4">${item.title}</h3>
                                    <span class="text-xs px-2 py-0.5 rounded-full border ${badgeColor}">${item.situation}</span>
                                </div>
                                <div class="text-xs text-gray-500 font-mono space-y-1">
                                    <p>Camera: <span class="text-gray-400">${item.camera}</span></p>
                                    <p>Sensitivity Rating: <span class="text-gray-400">ISO ${item.iso}</span></p>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch(e) {
                console.error("Failed to load records into view panel framework:", e);
            }
        }

        // Initialize display content parameters on primary load state
        window.onload = async function () {
            await loadPhotographers();
            triggerSearch();
        };
    </script>
</body>
</html>
